[build]
  base = "/"
  publish = "dist/"
  command = "npm run-script build"

[build.environment]
  NODE_VERSION = "22"

[context.production.environment]
  NODE_ENV = "production"

# Operational notes:
# - Netlify Node runtime is pinned here to keep deploy behavior reproducible.
# - Lighthouse is currently managed in the Netlify UI as a build plugin, not here.
#   If that plugin is ever moved into version-controlled config, add a [[plugins]]
#   entry here and the matching dependency in package.json.
# - Netlify Prerender is an extension, so it remains UI-managed rather than
#   netlify.toml-managed.

# Redirects and headers are GLOBAL for all builds – they do not get scoped to
# contexts no matter where you define them in the file.
# For context-specific rules, use _headers or _redirects files, which are
# PER-DEPLOY.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"

  [headers.values]
    # handled by netlify
    # strict-transport-security = "max-age=31536000; includeSubDomains; preload"
    # cache-control = "public, no-cache, max-age=0, must-revalidate"
    
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = '''
      frame-ancestors 'none';
    '''
